interface:
  display_name: "codev-checkpoint"
  short_description: "轻量提交并推送当前分支"
  default_prompt: "使用 $codev-checkpoint 走轻量 codev-checkpoint commit/push 流程；触发后立即用中文与用户交流，整个过程中的状态说明和结果摘要默认都用中文；如果仓库同时使用 gstack，则把它视为不接管 PR、review gate 或 repo 级文档同步的 fallback。默认只做 commit + push；只有当用户明确要求 bump 小版本号时，才允许处理仓库里已经存在的单个四段纯数字版本号 `x.y.z.w`，并且只把最后一位加一，同时最小更新已有 CHANGELOG；不要自动新建版本文件，不要自动新建 CHANGELOG，不要打 tag，也不要进入正式发布流程。"

policy:
  allow_implicit_invocation: false
