interface:
  display_name: "codev-quickship"
  short_description: "在人工验证通过后完成统一收尾：优先按 task 归档，同步 VERSION/CHANGELOG；有 task 时沿用 taskdev 的默认 build，无 task 时补跑并记录 CHANGELOG 摘要"
  default_prompt: "使用 $codev-quickship 在人工验证通过后收尾当前任务：触发后立即用中文与用户交流，默认以当前 git 分支为工作起点、以仓库默认主干为目标；把用户显式调用 `$codev-quickship` 本身视为已经确认“功能经过人工验证，且允许直接收尾与 push 主干”，不要重复追问同义确认问题；随后优先定位对应 task 文件，并从标题下方的 `Issue:` / `Issues:` 行或历史 `## Source Issues` 段解析 GitHub issue 映射；如果找到了 task，就同步最终 task 文档、更新已确认通过的验收项、归档到 `tasks/done/`，并按最小必要范围更新任务相关 `docs/`、`memory/` 与必要时的 `AGENTS.md`；如果仓库里没有可定位 task，则进入无 task 收尾模式，跳过 task 归档与 issue 关闭，但仍要在 `CHANGELOG` 中补一条本轮相关改动摘要，并继续做最小必要的 repo 文档同步；如果存在 task，默认沿用 `codev-taskdev` 收尾阶段已经完成的默认 build / 最小编译校验，不在 quickship 内重复执行，除非用户明确要求复验；如果是无 task 收尾模式，则必须主动根据仓库现有的 `AGENTS.md`、`README.md`、`memory/`、脚本或 manifest 定位并执行一次默认 build / 最小编译校验，优先使用仓库已经稳定存在的单一入口；这一步是代码门禁，不替代人工功能验证，如果 build 入口无法稳定判定、依赖当前不可用环境或执行失败，要明确报告并停止；根目录 `VERSION` 已初始化且必须是单个可稳定解析的 `X.Y.Z` 版本号；如果用户未显式指定版本，则默认把 `VERSION` 的补丁位加一（`z+1`）；如果用户显式指定目标版本，则按指定值写入，但该版本必须符合 `X.Y.Z`；随后同步已有 `CHANGELOG`；如果当前在分支上，就先提交这些收尾改动，再把分支合并到主干并推送；提交信息要采用 `type: 具体工作摘要 (vX.Y.Z)` 形式，工作摘要先写清具体工作，版本号放在最后括号里；如果已经在主干，就直接做最小提交并推送，并同样遵守上述 commit message 规则；如果 task 明确映射到 GitHub issue，则仅在主干 push 成功后先逐个执行 `gh issue comment <number>` 追加本轮工作摘要，再逐个执行 `gh issue close <number>` 关闭对应 issue；只有当用户在同轮明确表示“尚未人工验证”或“不要 push 主干”时，才停止；不要调用 $ship、$land-and-deploy、$document-release，不要创建 PR，不要打 tag，也不要进入正式发布流程。"
