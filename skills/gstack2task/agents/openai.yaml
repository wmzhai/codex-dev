interface:
  display_name: "gstack2task"
  short_description: "把 ~/.gstack/projects/ 下的 gstack 工件结合代码收敛成带实现计划的任务文件"
  default_prompt: "使用 $gstack2task 读取 ~/.gstack/projects/ 下与当前仓库相关的 gstack design doc、implementation handoff 或 test plan；触发后立即用中文与用户交流，整个过程中的工件判断、阻塞说明和结果汇报默认都用中文；必须结合当前代码，把上游约束映射成带 `Related Code`、`Implementation Plan` 和 `Validation Plan` 的 tasks/Txx-*.md，使用户审核 task plan 后即可直接交给 $taskdev 或 $autodev；按 tasks/ 与 tasks/done/ 中现有最大任务号顺延生成任务；如果拆成多个 task，则使用连续整数任务号，并为每个 task 分别新建与该 task 文件同名的新分支，再在各自分支写入文件。"
